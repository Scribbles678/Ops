version: '3.9'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scheduling
      DATABASE_SSL: "false"
      JWT_SECRET: dev-secret-replace-in-production-min-32-chars
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  seed:
    build:
      context: .
      target: builder
    command: node scripts/seed-first-user.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scheduling
      DATABASE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed-test-data:
    build:
      context: .
      target: builder
    command: node scripts/seed-test-data.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/scheduling
      DATABASE_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scheduling
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql-schema/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scheduling"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
